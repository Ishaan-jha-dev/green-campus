<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GreenPulse WasteAI Camera</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&amp;family=JetBrains+Mono:wght@400;700&amp;family=Space+Grotesk:wght@400;700&amp;display=swap" rel="stylesheet"/>

                    "on-error-container": "#93000a",
                    "inverse-primary": "#68dba9",

                    "tertiary": "#8d4b00",

                    "primary-container": "#00855d",
                    "tertiary-container": "#b15f00",
                    "outline": "#6d7a72",
                    "surface-container-highest": "#d9e3f2",
                    "on-surface": "#121c27",
                    "outline-variant": "#bccac0",
                    "surface-bright": "#f7f9ff",

                    "on-primary-container": "#f5fff7",
                    "on-error": "#ffffff",
                    "error": "#ba1a1a",
                    "surface-dim": "#d1dbe9",
                    "primary-fixed-dim": "#68dba9",

                    "error-container": "#ffdad6",

                    "on-background": "#121c27",

                    "on-surface-variant": "#3d4a42",
                    "on-primary-fixed": "#002114",
                    "surface-container-low": "#edf4ff",
                    "secondary": "#712ae2",
                    "on-primary-fixed-variant": "#005137",
                    "surface-container": "#e5effd",

                    "secondary-fixed": "#eaddff",

            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"

            "fontFamily": {
                    "headline": ["DM Sans", "sans-serif"],
                    "body": ["DM Sans", "sans-serif"],
                    "label": ["JetBrains Mono", "monospace"]
            }
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .viewfinder-corner {
            width: 40px;
            height: 40px;
            border-color: #7C3AED;
            border-width: 4px;
        }
        .pulse-reticle {
            box-shadow: 0 0 0 0 rgba(124, 58, 237, 0.4);
            animation: pulse-ring 2s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-black text-on-background font-body overflow-hidden">
<!-- Screen Container (Mobile Viewport) -->
<main class="relative w-full max-w-[393px] h-screen mx-auto overflow-hidden bg-black flex flex-col">
<!-- Full-Screen Camera Viewfinder -->
<div class="absolute inset-0 z-0">
<img alt="Clear plastic water bottle sitting on a light wooden table, bright daylight from a window casting soft shadows" class="w-full h-full object-cover opacity-90" data-alt="Clear plastic water bottle sitting on a light wooden table, bright daylight from a window casting soft shadows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCj0NltUEDWzW8fuaif6d4SNGcOKlMW_afJveo9IhQAvYB9aLcmE2aWpDcJ2wWS7R0B6svyXBU7JJU0wSauBFaE9C7wbzZc6mkpdOrgQEQwe1K2EHstKRnkuGpsr_y8l2VcIqlClDtBnyK7pCLFxsjYbQkjZIpJsghKUsYdP-jZB9ANaJp-Rscc9YM8d30gKiestcuBKcFu_3Nhi7gyCnXr0xQCLjnlI5wdMBiOReALoMt6RQ4aQ5O3uY2KyE3nfeKRjnkUJGtLfN2l"/>
<!-- Viewfinder Overlay Elements -->
<div class="absolute inset-0 bg-black/10"></div>
<!-- Viewfinder Brackets -->
<div class="absolute inset-x-8 top-[15%] bottom-[40%] pointer-events-none">
<div class="absolute top-0 left-0 viewfinder-corner border-t border-l rounded-tl-xl"></div>
<div class="absolute top-0 right-0 viewfinder-corner border-t border-r rounded-tr-xl"></div>
<div class="absolute bottom-0 left-0 viewfinder-corner border-b border-l rounded-bl-xl"></div>
<div class="absolute bottom-0 right-0 viewfinder-corner border-b border-r rounded-br-xl"></div>
<!-- Central Pulsing Reticle -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-16 h-16 border-2 border-secondary/60 rounded-full flex items-center justify-center pulse-reticle">
<div class="w-1.5 h-1.5 bg-secondary rounded-full"></div>
</div>
</div>
<!-- AI Detection Tag -->
<div class="absolute top-[35%] left-1/2 -translate-x-1/2 z-10 flex flex-col items-center">
<div class="bg-secondary text-white px-4 py-2 rounded-xl flex items-center gap-2 shadow-lg backdrop-blur-md">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">recycling</span>
<span class="font-headline font-bold text-sm tracking-tight">PET Plastic Bottle</span>
</div>
<div class="mt-2 bg-black/40 backdrop-blur-md border border-white/20 text-white font-label text-[10px] px-2 py-0.5 rounded-full uppercase tracking-widest">
                    94% CONFIDENT
                </div>
</div>
</div>
<!-- Top Controls Overlay -->
<div class="relative z-10 flex justify-between items-center px-6 pt-12 pb-4">
<button class="w-10 h-10 rounded-full bg-black/40 backdrop-blur-xl flex items-center justify-center text-white">
<span class="material-symbols-outlined">close</span>
</button>
<div class="flex gap-4">
<button class="w-10 h-10 rounded-full bg-black/40 backdrop-blur-xl flex items-center justify-center text-white">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">flash_off</span>
</button>
<button class="w-10 h-10 rounded-full bg-black/40 backdrop-blur-xl flex items-center justify-center text-white">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</div>
<!-- Spacer for camera view -->
<div class="flex-grow"></div>
<!-- Bottom Result Panel (Deep Violet) -->
<div class="relative z-20 bg-waste-deep rounded-t-[32px] p-8 shadow-[0_-12px_48px_rgba(0,0,0,0.5)]">
<!-- Pull Bar -->
<div class="w-12 h-1.5 bg-white/10 rounded-full mx-auto mb-8"></div>
<div class="flex items-start justify-between mb-8">
<div class="flex items-center gap-4">
<div class="w-16 h-16 bg-secondary/20 rounded-2xl flex items-center justify-center border border-secondary/30">
<span class="material-symbols-outlined text-4xl text-secondary-fixed-dim" style="font-variation-settings: 'FILL' 1;">recycling</span>
</div>
<div>
<h2 class="text-white font-headline text-2xl font-bold tracking-tight">Recyclable</h2>
<p class="text-secondary-fixed-dim font-label text-xs uppercase tracking-widest mt-1">PLASTIC CATEGORY 01</p>
</div>
</div>
<div class="bg-primary-container text-on-primary-container px-3 py-1.5 rounded-xl flex items-center gap-1.5 border border-primary-fixed/20">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">workspace_premium</span>
<span class="font-label text-sm font-bold">+12 PTS</span>
</div>
</div>
<div class="space-y-6">
<!-- Instruction Box -->
<div class="bg-white/5 rounded-2xl p-5 border border-white/10">
<p class="text-white/60 font-body text-sm mb-2">Campus Disposal Protocol:</p>
<p class="text-primary-fixed font-label text-lg font-bold leading-none">DROP IN BLUE BIN</p>
<div class="mt-4 flex gap-2">
<div class="flex-1 h-1 bg-primary-container rounded-full"></div>
<div class="flex-1 h-1 bg-white/10 rounded-full"></div>
<div class="flex-1 h-1 bg-white/10 rounded-full"></div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex gap-4">
<button class="flex-1 h-16 bg-secondary text-white rounded-2xl font-headline font-bold text-lg flex items-center justify-center gap-2 active:scale-95 transition-transform">
<span class="material-symbols-outlined">check_circle</span>
                        Log Waste
                    </button>
<button class="w-16 h-16 bg-white/10 text-white rounded-2xl flex items-center justify-center active:scale-95 transition-transform">
<span class="material-symbols-outlined">error</span>
</button>
</div>
</div>
<!-- Bottom Safety Margin for iOS/Gestures -->
<div class="h-6"></div>
</div>
<!-- Navigation Shell Suppression: As per rules, hiding global nav for this task-focused camera screen -->
<!-- Only displaying a subtle "Go Back" anchor if needed, but the close button handles exit -->
</main>
<!-- Shared Components JSON Mapping Verification (Hidden) -->
<div class="hidden">
<!-- BottomNavBar Logic Check -->
<!-- labels: ["Home", "Carbon", "Waste", "Energy"] -->
<!-- Active should be "Waste" but the instructions mandate focal task UI hides global nav -->
</div>
</body></html>
